name: Run Footy Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Create data folder
        run: mkdir -p data

      - run: python scrapers/footystats_scraper.py

      - uses: actions/upload-artifact@v4
        with:
          name: nrl-data
          path: data/*.csv
