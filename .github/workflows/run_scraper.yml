name: Run Footy Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python scrapers/footystats_scraper.py
        env:
          START_ID: 2000
          END_ID: 2700

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/footystats/games.csv

          git commit -m "Update footy stats data" || echo "No changes to commit"

          git push

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: footy-data
          path: data/footystats/games.csv
